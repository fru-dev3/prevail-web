[build]
  command = "npm run build"
  publish = "dist"

# Install script — serve the bash installer at /install with the right
# Content-Type so `curl -fsSL prevail.sh/install | bash` works cleanly.
# Must come BEFORE the SPA fallback below so it doesn't get swallowed.
[[redirects]]
  from = "/install"
  to = "/install"
  status = 200
  force = false

[[headers]]
  for = "/install"
  [headers.values]
    Content-Type = "text/x-shellscript; charset=utf-8"
    Cache-Control = "public, max-age=300"
    X-Content-Type-Options = "nosniff"

# SPA fallback — serve index.html for all routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security & performance headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

# Cache static assets aggressively (hashed filenames)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
