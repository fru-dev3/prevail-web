<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Prevail official logo
       Two opposing C-arcs (cyan on LEFT, gold on RIGHT) with two
       small dots floating outside the arcs (gold upper-right,
       cyan lower-left). Asymmetric placement → "two people in
       council, facing each other" feel.
       Solid colors. No transparency. -->

  <rect width="1024" height="1024" rx="224" ry="224" fill="#2a362a"/>

  <!-- CYAN C on LEFT, opens RIGHT -->
  <path d="M 485 694 A 210 210 0 1 0 485 330"
        stroke="#f7c551" stroke-width="124" fill="none"
        stroke-linecap="round" />

  <!-- GOLD C on RIGHT, opens LEFT -->
  <path d="M 539 694 A 210 210 0 1 1 539 330"
        stroke="#60c5d8" stroke-width="124" fill="none"
        stroke-linecap="round" />

  <!-- GOLD dot, upper-right -->
  <circle cx="700" cy="252" r="44" fill="#f7c551"/>

  <!-- CYAN dot, lower-left -->
  <circle cx="324" cy="772" r="44" fill="#60c5d8"/>
</svg>
